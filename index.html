<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Nissi 💖</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow-x: hidden;
    overflow-y: hidden;
    position: relative;
}

/* Glow title */
h1 {
    margin-top: 60px;
    font-size: 42px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d6d; }
    to { text-shadow: 0 0 25px #ff99aa; }
}

/* Text lines */
.line {
    opacity: 0;
    margin: 12px auto;
    width: 80%;
    font-size: 20px;
    transform: translateY(20px);
    transition: 1s;
}
.line.show {
    opacity: 1;
    transform: translateY(0) scale(1.05);
}

/* Highlight */
.highlight {
    color: #ff99aa;
    font-weight: bold;
    text-shadow: 0 0 20px pink;
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 40px;
    position: relative;
}
.gallery img {
    width: 200px;
    height: 200px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.8s ease, transform 0.5s ease, box-shadow 0.5s ease;
}

/* Slide in + gentle float */
@keyframes floatIn {
    0% { transform: translateY(50px) scale(0.8); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes floatUpDown {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
.gallery img.show {
    animation: floatIn 1s ease forwards, floatUpDown 3s ease-in-out infinite;
    box-shadow: 0 0 15px pink, 0 0 25px #ff4d6d;
}
.gallery img:hover {
    transform: scale(1.15) rotate(-2deg);
    box-shadow: 0 0 25px pink, 0 0 50px #ff99aa;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 22px;
    animation: float 5s linear infinite;
}
@keyframes float { to { transform: translateY(-100vh); opacity: 0; } }

/* Sparkles */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    animation: sparkleAnim 3s linear infinite;
}
@keyframes sparkleAnim {
    0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
    50% { transform: translateY(-200px) scale(1); opacity: 0.5; }
    100% { transform: translateY(-400px) scale(0.3); opacity: 0; }
}

/* Final cinematic ending */
.ending {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: #ff99aa;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    opacity: 0;
    transition: 2s;
}
.ending.show { opacity: 1; }
.big-heart { font-size: 100px; animation: boom 1s ease forwards; }
@keyframes boom { 0% { transform: scale(0); } 100% { transform: scale(1.5); } }

/* Overlay for start */
#overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background:black; display:flex; justify-content:center; align-items:center;
    color:white; font-size:24px; z-index:1000; cursor:pointer;
    text-align:center; padding:20px; animation: glowText 2s infinite alternate;
    flex-direction: column;
}
@keyframes glowText { from { text-shadow: 0 0 10px pink; } to { text-shadow: 0 0 25px #ff4d6d; } }

#startBtn {
    margin-top: 20px; padding: 12px 25px; font-size: 20px;
    border-radius: 12px; border: none; background: pink; color: black;
    cursor: pointer; box-shadow: 0 0 15px #ff4d6d;
}
#startBtn:hover { box-shadow: 0 0 25px pink, 0 0 50px #ff99aa; }
</style>
</head>

<body>
<h1>HEY NISSI ❤️</h1>
<div id="message"></div>

<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
</div>

<div class="ending" id="ending">
    <div class="big-heart">💖</div>
    <div>Happy Birthday my happiness Nissi 🎂</div>
    <div>I love you my princess 👑❤️</div>
</div>

<audio id="bgMusic">
    <source src="song.mp3" type="audio/mp3">
</audio>

<div id="overlay">
    💖 Open my princess, the surprise awaits 💖
    <button id="startBtn">💖 Open My Heart 💖</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const audio = document.getElementById("bgMusic");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const container = document.getElementById("message");

    const timeline = [
        { time: 3, text: "I’ve been trying to find the right words for you," },
        { time: 7, text: "but honestly… nothing ever feels enough..." },
        { time: 12, text: "From the day you came into my life," },
        { time: 16, text: "everything started feeling more meaningful." },
        { time: 22, text: "YOU ARE TRULY THE PRINCESS OF MY HEART 👑", highlight: true },
        { time: 28, text: "Your smile fixes my worst days," },
        { time: 32, text: "and your presence brings me peace." },
        { time: 38, text: "I really cherish you more than words can explain." },
        { time: 45, text: "Stay the same amazing person always 💫" }
    ];

    let shown = [];

    function startExperience() {
        audio.play().catch(()=>alert("Tap the button again to allow music"));
        overlay.style.display = "none";
    }

    overlay.addEventListener("click", startExperience);
    startBtn.addEventListener("click", startExperience);

    // Timeline
    audio.ontimeupdate = () => {
        let current = Math.floor(audio.currentTime);
        timeline.forEach((line,index)=>{
            if(current >= line.time && !shown.includes(index)){
                shown.push(index);
                const div = document.createElement("div");
                div.classList.add("line");
                if(line.highlight) div.classList.add("highlight");
                div.innerText = line.text;
                container.appendChild(div);
                setTimeout(()=> div.classList.add("show"),100);
            }
        });
        if(current >= 50){
            document.querySelectorAll(".gallery img").forEach((img,i)=>{
                setTimeout(()=> img.classList.add("show"), i*700);
            });
        }
        if(current >= 65){
            document.getElementById("ending").classList.add("show");
        }
    };

    // Hearts
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.innerHTML="💖";
        heart.classList.add("heart");
        heart.style.left = Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    },300);

    // Sparkles
    setInterval(()=>{
        let sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.style.left = Math.random()*100+"vw";
        sparkle.style.top = Math.random()*100+"vh";
        sparkle.style.width = Math.random()*6+4+"px";
        sparkle.style.height = sparkle.style.width;
        document.body.appendChild(sparkle);
        setTimeout(()=>sparkle.remove(),3000);
    },200);
});
</script>

</body>
</html>
